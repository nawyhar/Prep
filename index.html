<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 42001:2023 Exam Prep</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #0a2463;
            --secondary-blue: #1e3a8a;
            --accent-blue: #3b82f6;
            --gold: #d4af37;
            --light-gold: #f0e6d2;
            --dark-gold: #b8941f;
            --success-green: #10b981;
            --error-red: #ef4444;
            --background-dark: #0f172a;
            --card-dark: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #cbd5e1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, var(--background-dark) 0%, #1e1b4b 100%); color: var(--text-light); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }

        header {
            text-align: center; padding: 30px 20px; background: linear-gradient(135deg, var(--primary-blue) 0%, var(--secondary-blue) 100%);
            border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(212, 175, 55, 0.2); position: relative;
        }

        h1 { font-size: 2.2rem; margin-bottom: 10px; background: linear-gradient(90deg, var(--gold) 0%, var(--light-gold) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .modules-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .module-card { background: var(--card-dark); border-radius: 16px; padding: 20px; border: 1px solid rgba(59, 130, 246, 0.1); cursor: pointer; transition: 0.3s; }
        .module-card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .module-title { font-size: 1.2rem; font-weight: 600; color: var(--gold); margin-bottom: 10px; }
        
        .start-btn { width: 100%; background: linear-gradient(90deg, var(--gold) 0%, var(--dark-gold) 100%); color: var(--primary-blue); border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        .quiz-container, .results-container { display: none; }
        .scenario { background: rgba(10, 36, 99, 0.4); border-left: 4px solid var(--gold); padding: 15px; border-radius: 8px; margin-bottom: 20px; font-style: italic; font-size: 0.95rem; }
        .question-text { font-size: 1.2rem; margin-bottom: 20px; font-weight: 600; }
        
        .option { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; }
        .option:hover { background: rgba(59, 130, 246, 0.1); }
        .option.correct { border-color: var(--success-green); background: rgba(16, 185, 129, 0.1); }
        .option.incorrect { border-color: var(--error-red); background: rgba(239, 68, 68, 0.1); }
        
        .explanation-container { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid var(--accent-blue); margin-top: 20px; display: none; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-btn { padding: 10px 20px; border-radius: 8px; border: 1px solid var(--accent-blue); background: transparent; color: var(--accent-blue); cursor: pointer; }
        .nav-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>
    <div class="container">
        <div id="main-menu">
            <header>
                <h1>ISO 42001 Exam Simulator</h1>
                <p>Domain-Specific Use Case Training</p>
            </header>
            <div class="modules-container" id="module-list"></div>
        </div>

        <div id="quiz-container" class="quiz-container">
            <div id="module-label" style="color: var(--gold); margin-bottom: 10px;"></div>
            <div class="question-text" id="q-counter"></div>
            <div class="scenario" id="scenario-text"></div>
            <div class="question-text" id="question-body"></div>
            <div id="options-container"></div>
            <div id="explanation-container" class="explanation-container">
                <strong style="color: var(--accent-blue)">Explanation:</strong>
                <p id="explanation-text" style="margin-top: 10px;"></p>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goHome()">Home</button>
                <button class="nav-btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>
            </div>
        </div>

        <div id="results-container" class="results-container" style="text-align: center;">
            <h2 id="res-title">Results</h2>
            <div style="font-size: 3rem; margin: 20px 0;" id="final-score"></div>
            <button class="start-btn" style="max-width: 200px;" onclick="goHome()">Try Another</button>
        </div>
    </div>

    <script>
        const modules = {
            1: {
                title: "Domain 1: Leadership & Foundation",
                questions: [
                    { scenario: "A bank deploys an AI credit scoring system that unfairly denies loans to certain demographics.", question: "What is the PRIMARY leadership responsibility?", options: ["Delegate all decisions to data scientists", "Ensure AI ethical principles guide all decisions", "Focus only on profitability targets", "Approve all AI model code changes"], correct: 1, explanation: "Top management must ensure that the AI policy and objectives (including ethical considerations) are established and compatible with the strategic direction." },
                    { scenario: "Healthcare provider implements AI diagnostic tools without clear policies.", question: "What MUST senior management establish first?", options: ["Detailed technical specifications", "AI governance framework and objectives", "Employee training programs", "Vendor contracts"], correct: 1, explanation: "Senior management must establish the AI policy and objectives first." },
                    { scenario: "Manufacturing firm uses AI for quality control with biased results.", question: "Who bears ULTIMATE accountability for AI outcomes?", options: ["AI development team", "Executive leadership", "External auditors", "Quality assurance manager"], correct: 1, explanation: "Executive leadership is ultimately accountable for the AIMS." },
                    { scenario: "E-commerce platform's AI recommendations discriminate by location.", question: "What organizational structure is ESSENTIAL?", options: ["Flat chart", "Defined AI roles and responsibilities", "Unlimited developer autonomy", "External oversight"], correct: 1, explanation: "Clause 5.3 requires clearly defined and communicated roles." },
                    { scenario: "Telecom AI chatbot violates privacy regulations.", question: "What policy communication is MANDATORY?", options: ["Internal memo only", "To all relevant stakeholders", "Press release only", "No communication needed"], correct: 1, explanation: "Policy must be communicated to all relevant stakeholders." }
                ]
            },
            2: {
                title: "Domain 2: Risk Management",
                questions: [
                    { scenario: "Hiring AI tool systematically disadvantages women applicants.", question: "Risk assessment must evaluate impact on what?", options: ["Server costs", "Individuals, society, and environment", "Electricity usage", "Office space"], correct: 1, explanation: "ISO 42001 specifically requires evaluating social and individual impacts." },
                    { scenario: "Autonomous vehicle AI strikes pedestrian in complex scenario.", question: "What risk criterion takes HIGHEST priority?", options: ["Processing speed", "Human safety and rights", "Development budget", "Data storage"], correct: 1, explanation: "Human safety and fundamental rights are the highest priority in AI risk management." },
                    { scenario: "AI credit scoring rejects creditworthy minority applicants.", question: "Risk treatment must be what?", options: ["Always maximum mitigation", "Proportionate to identified risk level", "No treatment required", "Match competitors only"], correct: 1, explanation: "Treatment should be proportionate to the risk identified." },
                    { scenario: "Facial recognition misidentifies people of color at high rates.", question: "What documentation is REQUIRED post-assessment?", options: ["Lunch menus", "Risk assessment results and decisions", "Weather logs", "Nothing"], correct: 1, explanation: "Documentation of risk decisions is a mandatory requirement." },
                    { scenario: "Social media AI amplifies misinformation.", question: "What risk management principle is FUNDAMENTAL?", options: ["Proactive and continual process", "Reactive after incidents", "Delegate to users", "Ignore low-probability risks"], correct: 0, explanation: "Risk management must be a continual, proactive lifecycle process." }
                ]
            },
            3: {
                title: "Domain 3: Operations & Lifecycle",
                questions: [
                    { scenario: "Deployed AI model accuracy drops from 95% to 82% in 4 months.", question: "What control is REQUIRED?", options: ["Model performance monitoring", "Annual repainting", "Weekly polishing", "No monitoring"], correct: 0, explanation: "Continuous monitoring is required to identify model drift." },
                    { scenario: "Retrained fraud detection AI performs worse than original.", question: "What process control is ESSENTIAL?", options: ["Retraining validation procedures", "Office cleaning", "Coffee restocking", "No validation"], correct: 0, explanation: "All model changes/retraining must be validated." },
                    { scenario: "AI model versions conflict causing inconsistent predictions.", question: "What management practice is MISSING?", options: ["Model versioning and traceability", "Naming conventions only", "Color coding", "No management"], correct: 0, explanation: "Traceability and version control are required for AI lifecycle management." },
                    { scenario: "Production AI deployed without testing causes outages.", question: "What deployment control is ESSENTIAL?", options: ["Release and deployment procedures", "Public beta testing", "Employee voting", "Direct deployment"], correct: 0, explanation: "Formal release and deployment controls are required." }
                ]
            },
            4: {
                title: "Domain 4: Third-Party & Data",
                questions: [
                    { scenario: "Cloud AI vendor data breach compromises customer PII.", question: "What third-party control is REQUIRED?", options: ["Vendor selection and monitoring criteria", "Annual gifts", "Joint vacations", "No oversight"], correct: 0, explanation: "Clause 8.4 requires evaluation and monitoring of external providers." },
                    { scenario: "AI uses 2-year-old training data causing outdated predictions.", question: "What governance is MANDATORY?", options: ["Data quality management", "Delete after single use", "Share with all partners", "No governance"], correct: 0, explanation: "Continuous data quality management is required for system accuracy." },
                    { scenario: "Third-party AI component introduces security vulnerability.", question: "What verification is MANDATORY?", options: ["Supplier AI risk management evidence", "License cost", "Download speed", "File size"], correct: 0, explanation: "External components must meet the same risk standards as internal ones." }
                ]
            },
            5: {
                title: "Domain 5: Performance Evaluation",
                questions: [
                    { scenario: "Internal review finds undocumented AI risk decisions.", question: "What verification activity is MANDATORY?", options: ["Regular internal audits", "External audits only", "No audits required", "Social events"], correct: 0, explanation: "Internal audits are required to verify the implementation of the AIMS." },
                    { scenario: "Customer satisfaction with AI decisions drops 25%.", question: "What key indicator must be tracked?", options: ["AI risk treatment effectiveness", "Employee morale", "Office cleanliness", "Supply consumption"], correct: 0, explanation: "Performance monitoring must track if risk treatments are effective." },
                    { scenario: "AI bias incident causes regulatory fine.", question: "What is required after a nonconformity?", options: ["Addressing the issue and corrective action", "Ignoring it", "Blaming vendors", "No action"], correct: 0, explanation: "Nonconformities require a formal corrective action process." }
                ]
            },
            6: {
                title: "Domain 6: AI-Specific Controls",
                questions: [
                    { scenario: "Critical AI decisions lack human review.", question: "What safeguard is ABSOLUTELY REQUIRED?", options: ["Human oversight mechanisms", "Additional AI validation", "User self-review", "No oversight"], correct: 0, explanation: "Critical systems require a human-in-the-loop oversight mechanism." },
                    { scenario: "AI system lacks explainability for loan denials.", question: "What is required according to transparency principles?", options: ["Appropriate transparency levels", "Full source code disclosure", "No explanation", "Marketing explanations"], correct: 0, explanation: "Users must be provided with appropriate levels of explainability." },
                    { scenario: "Generative AI creates deepfake videos harming reputation.", question: "What control is required for content generation?", options: ["Transparency and identification of AI content", "Watermarking only", "Speed controls", "No controls"], correct: 0, explanation: "AI-generated content should be identifiable to users." }
                ]
            }
        };

        let currentActiveModule = null;
        let qIndex = 0;
        let score = 0;
        let answered = false;

        function init() {
            const list = document.getElementById('module-list');
            for (let id in modules) {
                const m = modules[id];
                const card = document.createElement('div');
                card.className = 'module-card';
                card.innerHTML = `<div class="module-title">${m.title}</div><p>${m.questions.length} Exam Questions</p><button class="start-btn" onclick="startQuiz(${id})">Start Module</button>`;
                list.appendChild(card);
            }
        }

        function startQuiz(id) {
            currentActiveModule = modules[id];
            qIndex = 0;
            score = 0;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('module-label').innerText = currentActiveModule.title;
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            const q = currentActiveModule.questions[qIndex];
            document.getElementById('q-counter').innerText = `Question ${qIndex + 1} of ${currentActiveModule.questions.length}`;
            document.getElementById('scenario-text').innerText = q.scenario;
            document.getElementById('question-body').innerText = q.question;
            document.getElementById('explanation-container').style.display = 'none';
            document.getElementById('next-btn').disabled = true;

            const optContainer = document.getElementById('options-container');
            optContainer.innerHTML = '';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = opt;
                div.onclick = () => selectOption(i, div);
                optContainer.appendChild(div);
            });
        }

        function selectOption(i, el) {
            if (answered) return;
            answered = true;
            const q = currentActiveModule.questions[qIndex];
            const allOpts = document.querySelectorAll('.option');

            if (i === q.correct) {
                el.classList.add('correct');
                score++;
            } else {
                el.classList.add('incorrect');
                allOpts[q.correct].classList.add('correct');
            }

            document.getElementById('explanation-text').innerText = q.explanation;
            document.getElementById('explanation-container').style.display = 'block';
            document.getElementById('next-btn').disabled = false;
            if (qIndex === currentActiveModule.questions.length - 1) {
                document.getElementById('next-btn').innerText = "Finish";
            } else {
                document.getElementById('next-btn').innerText = "Next";
            }
        }

        function nextQuestion() {
            qIndex++;
            if (qIndex < currentActiveModule.questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('results-container').style.display = 'block';
            const pct = Math.round((score / currentActiveModule.questions.length) * 100);
            document.getElementById('final-score').innerText = `${pct}%`;
            document.getElementById('res-title').innerText = pct >= 70 ? "Pass!" : "Keep Practicing";
        }

        function goHome() {
            location.reload();
        }

        init();
    </script>
</body>
</html>
