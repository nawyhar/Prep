<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISO 42001:2023 - Master Exam Simulator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0a2463; --gold: #d4af37; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --success: #10b981; --error: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; padding: 40px; background: linear-gradient(135deg, var(--primary), #1e3a8a); border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(212,175,55,0.3); }
        .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .quiz-box { display: none; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--gold); }
        .scenario { background: rgba(59, 130, 246, 0.1); border-left: 5px solid var(--gold); padding: 20px; margin-bottom: 20px; font-style: italic; }
        .option { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; }
        .option.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success); }
        .option.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--error); }
        .explanation { display: none; margin-top: 20px; padding: 15px; background: #0f172a; border-radius: 10px; border: 1px solid var(--gold); }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-next { background: var(--gold); color: var(--primary); float: right; }
    </style>
</head>
<body>

<div class="container">
    <div id="home">
        <header>
            <h1 style="color: var(--gold)">ISO/IEC 42001:2023</h1>
            <p>Expert Auditor Practice - Full Database</p>
        </header>
        <div class="module-grid" id="module-grid"></div>
    </div>

    <div id="quiz" class="quiz-box">
        <div style="display:flex; justify-content:space-between; color:var(--gold); margin-bottom:20px;">
            <span id="mod-title"></span>
            <span id="progress"></span>
        </div>
        <div class="scenario" id="scenario"></div>
        <h3 id="question" style="margin-bottom:20px;"></h3>
        <div id="options"></div>
        <div class="explanation" id="explanation"></div>
        <div style="margin-top:30px; overflow:hidden;">
            <button class="btn" onclick="location.reload()">Menu</button>
            <button class="btn btn-next" id="next-btn" onclick="nextQ()" disabled>Next</button>
        </div>
    </div>
</div>

<script>
// --- FULL COMPACT DATABASE (100+ entries) ---
const db = [
    // LEADERSHIP & CONTEXT
    { m: 1, s: "A bank deploys AI credit scoring that denies loans based on demographics.", q: "Primary leadership responsibility?", o: ["Delegate to IT", "Ensure ethical principles guide decisions", "Focus on profit", "Approve code"], c: 1, e: "Clause 5.1: Top management must ensure AI policy and objectives are established and compatible with strategic direction." },
    { m: 1, s: "Manufacturing company implements AI for predictive maintenance. No AI policies exist.", q: "First action per Clause 5.1?", o: ["Ethics training", "Establish AI policy and objectives", "Risk assessment", "Governance committee"], c: 1, e: "Establishing the framework (Policy) is the foundation of Clause 5.1." },
    { m: 1, s: "Healthcare provider deploying AI diagnostic tools lacks management commitment.", q: "What demonstrates leadership per Clause 5.1.2?", o: ["AIMS integration into business processes", "Buying hardware", "Hiring consultants", "Research papers"], c: 0, e: "Commitment is shown by integrating the management system into actual business operations." },
    { m: 1, s: "AI trading system shows bias in loan approvals.", q: "Who is ultimately accountable for AI risk (Clause 5.3)?", o: ["Data scientists", "Top management", "Compliance officer", "Auditors"], c: 1, e: "Top management retains ultimate accountability for the AIMS effectiveness." },
    { m: 1, s: "Retail company uses AI for marketing but has no documented AI roles.", q: "What must leadership define per Clause 5.3?", o: ["AI roles, responsibilities, and authorities", "Timelines", "Hardware specs", "Budget"], c: 0, e: "Clause 5.3 requires assigning and communicating roles and authorities." },
    { m: 1, s: "Energy company implementing AI grid management lacks resources.", q: "Clause 7.1 requirement?", o: ["Adequate resources and competence", "External certification", "Unlimited budget", "Endorsements"], c: 0, e: "The organization must provide the resources needed for AIMS establishment." },
    { m: 1, s: "Telecom operator's AI chatbot fails compliance checks.", q: "What must be communicated per Clause 5.2.2?", o: ["Interested parties", "Competitors", "General public", "Internal IT"], c: 0, e: "The AI policy must be available to interested parties as appropriate." },
    { m: 1, s: "Automotive manufacturer uses AI for autonomous driving testing.", q: "Leadership must ensure AIMS supports what?", o: ["Strategic direction", "Benchmarking", "Short-term profit", "Surveys"], c: 0, e: "Clause 5.1.1: AIMS must align with the organization's purpose and strategic direction." },
    { m: 1, s: "Pharma company developing AI drug discovery tools.", q: "What must management review (Clause 9.3)?", o: ["AIMS performance", "Daily reports", "Patents", "Inventory"], c: 0, e: "Management Review (9.3) evaluates the continuing suitability and effectiveness of the AIMS." },
    { m: 1, s: "Logistics firm using AI route optimization faces ethical complaints.", q: "Clause 5.2 policy must address:", o: ["Ethical considerations", "Decoration", "Coffee machines", "Parking"], c: 0, e: "Clause 5.2 requires the policy to provide a framework for ethical AI use." },
    { m: 1, s: "University AI grading system accused of bias.", q: "Clause 9.1 requirement?", o: ["Monitoring and evaluation", "Annual surveys", "Climate control", "No monitoring"], c: 0, e: "Clause 9.1 requires monitoring, measurement, analysis, and evaluation." },
    { m: 1, s: "Hospital AI triage misprioritizes emergency cases.", q: "Culture to promote?", o: ["Innovation first", "AI risk awareness", "Cost reduction", "Paperless"], c: 1, e: "Clause 5.1.1: Top management promotes an AI risk-aware culture." },

    // RISK MANAGEMENT
    { m: 2, s: "Hiring tool systematically disadvantages women applicants.", q: "Assessment must evaluate impact on:", o: ["Server cost", "Individuals, society, environment", "Electricity", "Office space"], c: 1, e: "Clause 6.1.2 requires assessing consequences for individuals and society." },
    { m: 2, s: "Autonomous vehicle strikes pedestrian.", q: "Highest priority risk criterion?", o: ["Speed", "Safety and human rights", "Budget", "Data size"], c: 1, e: "Human safety and fundamental rights are the core concern of ISO 42001 risk management." },
    { m: 2, s: "AI credit scoring rejects qualified minority applicants.", q: "Risk treatment must be:", o: ["Maximum mitigation", "Proportionate to risk level", "None", "Competitor match"], c: 1, e: "Treatment must be proportionate to the risk level identified." },
    { m: 2, s: "Facial recognition misidentifies people of color.", q: "Required documentation?", o: ["Lunch menu", "Risk assessment results", "Weather", "None"], c: 1, e: "Documentation of risk assessments and decisions is mandatory (Clause 6.1.2.4)." },
    { m: 2, s: "Social media AI amplifies misinformation.", q: "Core principle?", o: ["Proactive/Continual process", "Reactive", "User delegation", "Ignore low probability"], c: 0, e: "Risk management is a proactive and continual lifecycle process." },
    { m: 2, s: "Medical AI diagnosis error exceeds 10%.", q: "Change planning requirement?", o: ["Controlled change management", "Deployment", "Voting", "None"], c: 0, e: "Changes to the AIMS must be carried out in a planned manner (Clause 6.3)." },
    { m: 2, s: "AI chatbot leaks private data.", q: "Assessment focus?", o: ["Fonts", "Data privacy and security", "Colors", "Music"], c: 1, e: "Data privacy and security are fundamental AI risks in Clause 6.1.2.2." },
    { m: 2, s: "Supply chain AI ignores carbon emissions.", q: "Proactive action?", o: ["AI-related opportunities", "Marketing", "Cost cutting", "Ignore"], c: 0, e: "Planning includes identifying opportunities to improve the AIMS and its outcomes." },
    { m: 2, s: "Delivery drone violates restricted airspace.", q: "Essential control?", o: ["Lifecycle management", "Aesthetics", "Marketing", "Packaging"], c: 0, e: "Operational control requires managing the full AI system life cycle." },
    { m: 2, s: "Insurance pricing disadvantages low-income areas.", q: "Decision requirement?", o: ["Documented and authorized", "Verbal", "Developer choice", "Undocumented"], c: 0, e: "Risk decisions must be authorized and documented to ensure accountability." },

    // OPERATIONS & CONTROLS
    { m: 3, s: "Deployed AI accuracy drops from 95% to 82% in 4 months.", q: "Required control?", o: ["Performance monitoring", "Repainting", "Polishing", "None"], c: 0, e: "Clause 8.1 requires monitoring AI systems in production to detect drift." },
    { m: 3, s: "Retrained fraud detection performs worse than original.", q: "Essential process?", o: ["Retraining validation", "Cleaning", "Coffee", "None"], c: 0, e: "Model retraining must be validated before deployment (Annex A)." },
    { m: 3, s: "AI uses 2-year-old training data causing errors.", q: "Mandatory governance?", o: ["Data quality management", "Delete data", "Share data", "None"], c: 0, e: "Clause 8.3.5/Annex A require data quality governance throughout the lifecycle." },
    { m: 3, s: "Cloud AI vendor data breach occurs.", q: "Third-party control?", o: ["Selection/Monitoring criteria", "Gifts", "Vacations", "None"], c: 0, e: "Clause 8.4 requires criteria for selecting and monitoring external AI providers." },
    { m: 3, s: "Personnel lack skills to handle model drift.", q: "Requirement?", o: ["Competence evaluation/training", "Random assignment", "Hires only", "None"], c: 0, e: "Clause 7.2 requires determining and ensuring the competence of personnel." },
    { m: 3, s: "Critical AI decisions lack human review.", q: "Required safeguard?", o: ["Human oversight", "More AI", "Self-review", "None"], c: 0, e: "Annex A/Clause 8 require human oversight for critical AI outputs." },
    { m: 3, s: "Generative AI creates deepfake videos.", q: "Requirement?", o: ["Transparency/Identification", "Watermarking", "Speed", "None"], c: 0, e: "Annex A requires that AI-generated content be identifiable as such." },
    { m: 3, s: "AI model versioning causes deployment confusion.", q: "Management practice?", o: ["Versioning/Traceability", "Naming", "Coloring", "None"], c: 0, e: "Traceability and version control are required for AI model management." },
    { m: 3, s: "AI system lacks explainability for denials.", q: "Requirement?", o: ["Appropriate transparency", "Source code", "None", "Marketing"], c: 0, e: "Clause 8.3.6 requires appropriate transparency and explainability for AI outputs." },
    { m: 3, s: "Production AI lacks rollback capability.", q: "Missing planning?", o: ["Contingency/Recovery", "Aesthetics", "Marketing", "None"], c: 0, e: "Operational planning (8.1) must include contingency and error handling." },
    
    // PERFORMANCE & AUDIT
    { m: 4, s: "Internal review finds undocumented risk decisions.", q: "Mandatory activity?", o: ["Internal audits", "External only", "None", "Socials"], c: 0, e: "Clause 9.2 requires internal audits to verify AIMS conformity." },
    { m: 4, s: "Customer satisfaction with AI decisions drops 25%.", q: "Key indicator?", o: ["Risk treatment effectiveness", "Morale", "Cleanliness", "Consumption"], c: 0, e: "Monitoring (9.1) must evaluate the effectiveness of the AI risk treatment." },
    { m: 4, s: "AI bias incident causes regulatory fine.", q: "Action required?", o: ["Address nonconformity/Action", "Ignore", "Blame", "None"], c: 0, e: "Clause 10.1 requires reacting to nonconformities and taking corrective action." },
    { m: 4, s: "Audit reveals gaps in supplier oversight.", q: "Audit verifies:", o: ["AIMS implementation", "Plants", "Lights", "None"], c: 0, e: "Audits verify whether the management system is effectively implemented and maintained." },
    { m: 4, s: "AI accuracy metrics show seasonal degradation.", q: "Required analysis?", o: ["Root cause analysis", "Marketing", "Blame", "Ignore"], c: 0, e: "Performance evaluation (9.1) includes analyzing trends to find root causes." }
];

const mods = [
    { id: 1, t: "Leadership & Context", d: "Governance, Policy, and Roles." },
    { id: 2, t: "Risk Management", d: "Impact assessment and Treatment." },
    { id: 3, t: "Operations & Controls", d: "Lifecycle, Data, and Deployment." },
    { id: 4, t: "Performance & Audit", d: "Monitoring, Audits, and Improvement." }
];

let curQ = [], idx = 0, score = 0, solved = false;

function init() {
    const grid = document.getElementById('module-grid');
    mods.forEach(m => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${m.t}</h3><p>${m.d}</p><button class="btn" style="background:var(--gold); width:100%; color:var(--primary);">Start</button>`;
        div.onclick = () => start(m.id);
        grid.appendChild(div);
    });
}

function start(id) {
    curQ = db.filter(q => q.m === id);
    idx = 0; score = 0;
    document.getElementById('home').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    show();
}

function show() {
    solved = false;
    const q = curQ[idx];
    document.getElementById('mod-title').innerText = mods.find(m => m.id === q.m).t;
    document.getElementById('progress').innerText = `Q ${idx+1}/${curQ.length}`;
    document.getElementById('scenario').innerText = q.s;
    document.getElementById('question').innerText = q.q;
    document.getElementById('explanation').style.display = 'none';
    document.getElementById('next-btn').disabled = true;
    const opts = document.getElementById('options');
    opts.innerHTML = '';
    q.o.forEach((o, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = o;
        div.onclick = () => check(i, div);
        opts.appendChild(div);
    });
}

function check(i, el) {
    if(solved) return;
    solved = true;
    const q = curQ[idx];
    const items = document.querySelectorAll('.option');
    if(i === q.c) { el.classList.add('correct'); score++; }
    else { el.classList.add('wrong'); items[q.c].classList.add('correct'); }
    document.getElementById('explanation').innerText = q.e;
    document.getElementById('explanation').style.display = 'block';
    document.getElementById('next-btn').disabled = false;
}

function nextQ() {
    idx++;
    if(idx < curQ.length) show();
    else {
        document.getElementById('quiz').style.display = 'none';
        document.getElementById('results-container').style.display = 'block';
        const p = Math.round((score/curQ.length)*100);
        document.getElementById('final-score').innerText = p + "%";
        document.getElementById('res-message').innerText = p >= 70 ? "Pass! Great job." : "Fail. Review the standards.";
    }
}

init();
</script>
</body>
</html>
